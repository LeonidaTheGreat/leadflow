<!doctype html>
<!-- LeadFlow Dashboard v2 - Performance Optimized -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5" />
  <title>LeadFlow AI — Live Execution Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg-primary: #0b1020; --bg-card: #131a33; --bg-card-ok: #132a13; --bg-card-warn: #2a2613;
      --bg-card-error: #2a1313; --border-default: #24305f; --border-ok: #2a5b2a;
      --border-warn: #5b5a2a; --border-error: #5b2a2a; --text-primary: #e8ecff;
      --text-muted: #a8b3dd; --text-ok: #57d98d; --text-warn: #ffd166; --text-error: #ff6b6b;
      --skeleton-bg: #1e2a58; --skeleton-shine: #2a3a6f;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: var(--bg-primary); color: var(--text-primary); line-height: 1.5; }
    .wrap { max-width: 1400px; margin: 24px auto; padding: 0 16px; }
    h1 { font-size: 28px; margin-bottom: 8px; }
    h2 { font-size: 20px; margin-top: 24px; margin-bottom: 12px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 12px; }
    .grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    @media (max-width: 768px) { .grid4 { grid-template-columns: 1fr; } }
    @media (min-width: 769px) and (max-width: 1024px) { .grid4 { grid-template-columns: repeat(2, 1fr); } }
    .card { background: var(--bg-card); border: 1px solid var(--border-default); border-radius: 12px; padding: 14px; }
    .card.ok { background: var(--bg-card-ok); border-color: var(--border-ok); }
    .card.warn { background: var(--bg-card-warn); border-color: var(--border-warn); }
    .card.error { background: var(--bg-card-error); border-color: var(--border-error); }
    .kpi { font-size: 28px; font-weight: 700; }
    .muted { color: var(--text-muted); font-size: 12px; }
    .small { font-size: 11px; }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; background: #1e2a58; border: 1px solid #30418a; font-size: 12px; }
    .ok { color: var(--text-ok); font-weight: 700; }
    .warn { color: var(--text-warn); font-weight: 700; }
    .bad { color: var(--text-error); font-weight: 700; }
    @keyframes skeleton-shine {
      0% { background-position: -200px 0; }
      100% { background-position: calc(200px + 100%) 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, var(--skeleton-bg) 25%, var(--skeleton-shine) 50%, var(--skeleton-bg) 75%);
      background-size: 200px 100%;
      animation: skeleton-shine 1.5s ease-in-out infinite;
      border-radius: 4px;
    }
    .skeleton-text { height: 16px; margin-bottom: 8px; }
    .skeleton-kpi { height: 36px; width: 80px; margin: 8px 0; }
    .table-wrapper { width: 100%; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; margin-top: 8px; background: var(--bg-card); border: 1px solid var(--border-default); border-radius: 12px; overflow: hidden; font-size: 13px; }
    th, td { padding: 10px; border-bottom: 1px solid var(--border-default); text-align: left; }
    th { background: #161f43; font-weight: 600; }
    .perf-badge {
      position: fixed; bottom: 16px; right: 16px; background: var(--bg-card);
      border: 1px solid var(--border-default); border-radius: 8px; padding: 8px 12px;
      font-size: 11px; z-index: 1000;
    }
    .perf-badge.slow { border-color: var(--text-warn); color: var(--text-warn); }
    .perf-badge.fast { border-color: var(--text-ok); color: var(--text-ok); }
  </style>
</head>
<body>
<div class="wrap">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
    <div>
      <h1>LeadFlow AI — Live Dashboard</h1>
      <div class="muted">Performance Optimized v2</div>
    </div>
    <div id="project-status"><div class="skeleton skeleton-text" style="width:120px;"></div></div>
  </div>

  <h2>🎯 Key Metrics</h2>
  <div class="grid4" id="kpi-container">
    <div class="card"><div class="muted">Days to MVP</div><div class="skeleton skeleton-kpi"></div></div>
    <div class="card"><div class="muted">Pilot Agents</div><div class="skeleton skeleton-kpi"></div></div>
    <div class="card"><div class="muted">System Health</div><div class="skeleton skeleton-kpi"></div></div>
    <div class="card"><div class="muted">Blockers</div><div class="skeleton skeleton-kpi"></div></div>
  </div>

  <h2>📊 System Status</h2>
  <div id="system-components" class="grid"><div class="card"><div class="skeleton skeleton-text"></div></div></div>

  <h2>🚀 Task Queue</h2>
  <div id="task-queue-content"><div class="card"><div class="skeleton skeleton-text"></div></div></div>

  <h2>🤖 Agent Activity</h2>
  <div id="agent-activity-content" class="grid"><div class="card"><div class="skeleton skeleton-text"></div></div></div>

  <h2>📋 Completed Work</h2>
  <div id="completed-work-content"><div class="card"><div class="skeleton skeleton-text"></div></div></div>

  <div class="card" style="margin-top:24px;text-align:center;">
    <div class="muted">Source: Supabase | <span id="last-updated">Never</span> | Load: <span id="load-time">-</span></div>
  </div>
</div>

<div id="perf-badge" class="perf-badge" style="display:none;"><span id="perf-text">-</span></div>

<script>
const DASHBOARD_START_TIME = performance.now();
const SUPABASE_URL = 'https://fptrokacdwzlmflyczdz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZwdHJva2FjZHd6bG1mbHljemR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3MTE4MTUsImV4cCI6MjA4NzI4NzgxNX0.NcGeeYQyTaY3n-w22yjxUPxJ5ZC4v6b3Kv7gnr0TGcU';
const PROJECT_ID = 'bo2026';
let supabase = null;
const cache = new Map();
const CACHE_TTL = 30000;

function getCache(key) {
  const item = cache.get(key);
  if (!item) return null;
  if (Date.now() - item.timestamp > CACHE_TTL) {
    cache.delete(key);
    return null;
  }
  return item.data;
}

function setCache(key, data) {
  cache.set(key, { data, timestamp: Date.now() });
}

async function init() {
  try {
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    await loadCriticalData();
    loadNonCriticalData();
    updatePerformanceBadge();
  } catch (e) {
    console.error('Failed to connect:', e);
  }
}

async function loadCriticalData() {
  const loadStart = performance.now();
  await Promise.all([loadProjectMetadata(), loadKPIs()]);
  console.log(`[Performance] Critical data: ${(performance.now() - loadStart).toFixed(2)}ms`);
  document.getElementById('last-updated').textContent = new Date().toLocaleTimeString();
}

async function loadNonCriticalData() {
  const loadStart = performance.now();
  await Promise.all([
    loadSystemComponents(), loadTaskQueue(), loadAgents(), loadCompletedWork()
  ]);
  console.log(`[Performance] Non-critical data: ${(performance.now() - loadStart).toFixed(2)}ms`);
}

function updatePerformanceBadge() {
  const totalLoadTime = performance.now() - DASHBOARD_START_TIME;
  const badge = document.getElementById('perf-badge');
  const text = document.getElementById('perf-text');
  document.getElementById('load-time').textContent = (totalLoadTime / 1000).toFixed(2) + 's';
  badge.style.display = 'block';
  text.textContent = (totalLoadTime / 1000).toFixed(2) + 's';
  badge.classList.add(totalLoadTime > 2000 ? 'slow' : 'fast');
}

async function loadProjectMetadata() {
  const cached = getCache('project-metadata');
  if (cached) { renderProjectMetadata(cached); return; }
  const { data } = await supabase.from('project_metadata').select('*').eq('project_id', PROJECT_ID).single();
  if (data) { setCache('project-metadata', data); renderProjectMetadata(data); }
}

function renderProjectMetadata(data) {
  const dayNum = Math.ceil((new Date() - new Date('2026-02-15')) / 86400000);
  document.getElementById('project-status').innerHTML = `<div style="text-align:right;"><div class="ok" style="font-size:24px;font-weight:700;">${data.status_color || '🟢'} ${data.overall_status || 'ACTIVE'}</div><div class="muted">Day ${dayNum} of ${data.deadline_days || 60}</div></div>`;
}

async function loadSystemComponents() {
  const cached = getCache('system-components');
  if (cached) { renderSystemComponents(cached); return; }
  const { data } = await supabase.from('system_components').select('component_name,status,status_emoji,details').eq('project_id', PROJECT_ID).order('category');
  if (data) { setCache('system-components', data); renderSystemComponents(data); }
}

function renderSystemComponents(data) {
  document.getElementById('system-components').innerHTML = data.map(comp => `<div class="card ${comp.status === 'healthy' || comp.status === 'LIVE' ? 'ok' : comp.status === 'warning' ? 'warn' : ''}"><div style="display:flex;justify-content:space-between;"><strong>${comp.component_name}</strong><span class="pill">${comp.status_emoji || '●'} ${comp.status}</span></div><div class="muted small">${comp.details || ''}</div></div>`).join('');
}

async function loadKPIs() {
  const cached = getCache('kpis');
  if (cached) { renderKPIs(cached); return; }
  const [{ data: tasks }, { data: agents }] = await Promise.all([
    supabase.from('tasks').select('status').eq('project_id', PROJECT_ID),
    supabase.from('agents').select('status').eq('project_id', PROJECT_ID)
  ]);
  const kpis = {
    blocked: (tasks || []).filter(t => t.status === 'blocked').length,
    activeAgents: (agents || []).filter(a => a.status === 'ACTIVE' || a.status === 'Complete').length,
    totalAgents: (agents || []).length,
    dayNum: Math.ceil((new Date() - new Date('2026-02-15')) / 86400000)
  };
  setCache('kpis', kpis);
  renderKPIs(kpis);
}

function renderKPIs(kpis) {
  const daysToMVP = Math.max(0, 60 - kpis.dayNum);
  document.getElementById('kpi-container').innerHTML = `
    <div class="card"><div class="muted">Days to MVP</div><div class="kpi ${daysToMVP < 10 ? 'warn' : 'ok'}">${daysToMVP}</div><div class="muted">Day ${kpis.dayNum} of 60</div></div>
    <div class="card"><div class="muted">Pilot Agents</div><div class="kpi">${kpis.activeAgents} / 5</div></div>
    <div class="card"><div class="muted">System Health</div><div class="kpi ok">${kpis.activeAgents}/${kpis.totalAgents || 5}</div></div>
    <div class="card"><div class="muted">Blockers</div><div class="kpi ${kpis.blocked > 0 ? 'warn' : 'ok'}">${kpis.blocked}</div></div>`;
}

async function loadTaskQueue() {
  const cached = getCache('task-queue');
  if (cached) { renderTaskQueue(cached); return; }
  const { data } = await supabase.from('tasks').select('title,status,agent_id,model,estimated_cost_usd,blocked_reason').eq('project_id', PROJECT_ID).in('status', ['ready','in_progress','blocked']).order('priority').limit(20);
  if (data) { setCache('task-queue', data); renderTaskQueue(data); }
}

function renderTaskQueue(data) {
  const ready = data.filter(t => t.status === 'ready');
  const inProgress = data.filter(t => t.status === 'in_progress');
  const blocked = data.filter(t => t.status === 'blocked');
  let html = `<div class="card" style="margin-bottom:12px;"><strong>Queue:</strong> <span class="ok">Ready: ${ready.length}</span> | <span class="warn">In Progress: ${inProgress.length}</span> | <span class="bad">Blocked: ${blocked.length}</span></div>`;
  if (ready.length > 0) {
    html += '<div class="table-wrapper"><table><tr><th>Task</th><th>Agent</th><th>Model</th><th>Cost</th></tr>';
    ready.slice(0,5).forEach(t => { html += `<tr><td>${t.title}</td><td>${t.agent_id || '-'}</td><td><span class="pill">${t.model || 'kimi'}</span></td><td>$${(t.estimated_cost_usd || 0).toFixed(2)}</td></tr>`; });
    html += '</table></div>';
  }
  // Display blocked tasks with their blocked_reason
  if (blocked.length > 0) {
    html += '<h3 style="margin-top:16px;margin-bottom:8px;color:var(--text-error);">⛔ Blocked Tasks</h3>';
    html += '<div class="table-wrapper"><table><tr><th>Task</th><th>Reason</th></tr>';
    blocked.slice(0,10).forEach(t => { html += `<tr><td>${t.title}</td><td class="bad">${t.blocked_reason || 'Unknown blocker'}</td></tr>`; });
    html += '</table></div>';
  }
  document.getElementById('task-queue-content').innerHTML = html;
}

async function loadAgents() {
  const cached = getCache('agents');
  if (cached) { renderAgents(cached); return; }
  const { data } = await supabase.from('agents').select('agent_name,status,agent_type,current_task,progress_percent,blocker').eq('project_id', PROJECT_ID).order('agent_name');
  if (data) { setCache('agents', data); renderAgents(data); }
}

function renderAgents(data) {
  document.getElementById('agent-activity-content').innerHTML = data.map(agent => `<div class="card ${agent.status === 'ACTIVE' ? 'ok' : agent.blocker ? 'warn' : ''}"><div style="display:flex;justify-content:space-between;"><span class="${agent.status === 'ACTIVE' ? 'ok' : agent.blocker ? 'bad' : 'warn'}">● ${agent.agent_name}</span><span class="pill">${agent.agent_type || 'kimi'}</span></div><div class="muted small">${agent.current_task || 'No active task'} - ${agent.progress_percent || 0}%</div></div>`).join('');
}

async function loadCompletedWork() {
  const cached = getCache('completed-work');
  if (cached) { renderCompletedWork(cached); return; }
  const { data } = await supabase.from('completed_work').select('work_name,use_case,hours_spent').eq('project_id', PROJECT_ID).eq('status','COMPLETE').order('completed_date',{ascending:false}).limit(10);
  if (data) { setCache('completed-work', data); renderCompletedWork(data); }
}

function renderCompletedWork(data) {
  if (data.length === 0) { document.getElementById('completed-work-content').innerHTML = '<div class="muted">No completed work yet</div>'; return; }
  document.getElementById('completed-work-content').innerHTML = `<div class="table-wrapper"><table><tr><th>Work</th><th>UC</th><th>Hours</th></tr>${data.map(w => `<tr><td><strong>${w.work_name}</strong></td><td>${w.use_case || '-'}</td><td>${w.hours_spent || 0}h</td></tr>`).join('')}</table></div>`;
}

document.addEventListener('DOMContentLoaded', init);
setInterval(() => {
  cache.clear();
  loadCriticalData();
  loadNonCriticalData();
}, 60000);
</script>
</body>
</html>
